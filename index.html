<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Alpine Cheese Rush</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a14;
      touch-action: none;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      -webkit-user-select: none;
      user-select: none;
    }

    /* Three.js canvas fills the window */
    canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* UI overlay sits on top of the canvas */
    #ui-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 10;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Interactive elements receive pointer events */
    #ui-overlay .interactive {
      pointer-events: auto;
    }

    /* --- Panel base style --- */
    .panel {
      background: rgba(13, 13, 26, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #ccc;
      font-size: 13px;
    }

    /* --- Resource bar (top) --- */
    #resource-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 36px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 18px;
      font-size: 13px;
      font-family: monospace;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #resource-bar .res-item {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #aaa;
    }
    #resource-bar .res-value {
      color: #ffcc00;
      font-weight: bold;
    }

    /* --- Sidebar (right) --- */
    #sidebar {
      position: absolute;
      top: 36px;
      right: 0;
      width: 180px;
      bottom: 0;
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
    }
    #sidebar-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #sidebar-tabs button {
      flex: 1;
      background: transparent;
      border: none;
      color: #888;
      font-size: 12px;
      font-family: monospace;
      padding: 8px 0;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
    }
    #sidebar-tabs button.active {
      color: #ffcc00;
      border-bottom: 2px solid #ffcc00;
    }
    #sidebar-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 6px;
    }
    #sidebar-buttons button {
      background: rgba(40, 40, 60, 0.8);
      border: 1px solid rgba(255,255,255,0.1);
      color: #ccc;
      font-size: 11px;
      font-family: monospace;
      padding: 6px 2px;
      cursor: pointer;
      border-radius: 2px;
      min-height: 44px;
      min-width: 44px;
    }
    #sidebar-buttons button:active {
      background: rgba(60, 60, 80, 0.9);
    }
    #sidebar-buttons button.disabled {
      opacity: 0.4;
      cursor: default;
    }
    #build-progress {
      padding: 6px 8px;
      font-family: monospace;
      font-size: 11px;
      color: #aaa;
    }
    #build-progress-bar {
      width: 100%;
      height: 6px;
      background: #1a1a2e;
      border-radius: 3px;
      margin-top: 4px;
      overflow: hidden;
    }
    #build-progress-fill {
      height: 100%;
      width: 0%;
      background: #4a8a4a;
      transition: width 0.2s;
    }
    #surrender-btn {
      margin: auto 8px 8px;
      background: rgba(100, 30, 30, 0.6);
      border: 1px solid rgba(255, 80, 80, 0.2);
      color: #cc6666;
      font-family: monospace;
      font-size: 12px;
      padding: 10px;
      cursor: pointer;
      min-height: 44px;
      border-radius: 2px;
    }

    /* --- Minimap (bottom-right inside sidebar) --- */
    #minimap-container {
      padding: 6px;
    }
    #minimap-canvas {
      width: 100%;
      height: 140px;
      background: #000;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* --- Selection panel (bottom) --- */
    #selection-panel {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 180px;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      font-family: monospace;
      font-size: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    #selection-info {
      color: #aaa;
    }

    /* --- Menu screens --- */
    .menu-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 20, 0.95);
    }
    .menu-screen.hidden {
      display: none;
    }
    .menu-title {
      font-size: 36px;
      font-weight: bold;
      font-family: monospace;
      color: #ffcc00;
      margin-bottom: 8px;
    }
    .menu-subtitle {
      font-size: 16px;
      font-family: monospace;
      color: #888;
      margin-bottom: 40px;
    }
    .menu-btn {
      display: block;
      width: 260px;
      padding: 16px;
      margin: 8px 0;
      background: rgba(40, 60, 40, 0.8);
      border: 2px solid rgba(74, 138, 74, 0.5);
      color: #ccddcc;
      font-family: monospace;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
      border-radius: 3px;
      min-height: 44px;
    }
    .menu-btn:active {
      background: rgba(60, 80, 60, 0.9);
    }
    .menu-btn.secondary {
      background: rgba(40, 40, 60, 0.8);
      border-color: rgba(74, 74, 138, 0.5);
      color: #ccccdd;
    }

    /* Skirmish / Campaign setup */
    .setup-screen {
      overflow-y: auto;
      padding: 30px 20px;
    }
    .setup-screen .section-label {
      font-family: monospace;
      font-size: 14px;
      color: #aaa;
      margin: 20px 0 8px;
      text-align: center;
    }
    .setup-screen .option-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .setup-screen .option-btn {
      min-width: 80px;
      padding: 10px 16px;
      background: rgba(26, 26, 36, 0.9);
      border: 1px solid #444;
      color: #888;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      border-radius: 2px;
      min-height: 44px;
    }
    .setup-screen .option-btn.selected {
      background: rgba(50, 80, 50, 0.9);
      border-color: #6a6;
      color: #cfc;
    }
    .setup-screen .start-btn {
      display: block;
      width: 280px;
      margin: 30px auto 10px;
      padding: 16px;
      background: rgba(42, 74, 42, 0.9);
      border: 2px solid rgba(74, 138, 74, 0.6);
      color: #ccffcc;
      font-family: monospace;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
      border-radius: 3px;
      min-height: 44px;
    }
    .setup-screen .back-btn {
      display: block;
      width: 160px;
      margin: 10px auto;
      padding: 10px;
      background: rgba(26, 26, 36, 0.9);
      border: 1px solid #444;
      color: #888;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      border-radius: 2px;
      min-height: 44px;
    }

    /* Campaign mission list */
    .mission-item {
      width: 440px;
      max-width: 90vw;
      padding: 12px 16px;
      margin: 4px 0;
      background: rgba(26, 26, 46, 0.9);
      border: 1px solid #444;
      cursor: pointer;
      border-radius: 2px;
      text-align: left;
      min-height: 44px;
    }
    .mission-item.selected {
      background: rgba(42, 58, 42, 0.9);
      border-color: rgba(74, 138, 74, 0.6);
    }
    .mission-item.locked {
      opacity: 0.4;
      cursor: default;
    }
    .mission-name {
      font-family: monospace;
      font-size: 14px;
      font-weight: bold;
      color: #ddd;
    }
    .mission-desc {
      font-family: monospace;
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    /* Result overlay (victory/defeat) */
    .result-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
    }
    .result-overlay.hidden {
      display: none;
    }
    .result-title {
      font-size: 48px;
      font-weight: bold;
      font-family: monospace;
      margin-bottom: 20px;
    }
    .result-title.victory { color: #44ff44; }
    .result-title.defeat { color: #ff4444; }
    .result-time {
      font-family: monospace;
      font-size: 18px;
      color: #aaa;
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
  <!-- Three.js inserts its canvas here (before #ui-overlay) -->

  <div id="ui-overlay">
    <!-- Resource bar -->
    <div id="resource-bar" class="panel interactive">
      <div class="res-item">Cheese: <span id="res-cheese" class="res-value">0</span></div>
      <div class="res-item">Power: <span id="res-power" class="res-value">0/0</span></div>
      <div class="res-item">Units: <span id="res-units" class="res-value">0</span></div>
      <div class="res-item" style="margin-left:auto; color:#666;">
        <span id="res-fps">0</span> FPS |
        Tile: <span id="res-tile">-,-</span>
      </div>
    </div>

    <!-- Sidebar -->
    <div id="sidebar" class="panel interactive">
      <div id="sidebar-tabs">
        <button class="active" data-tab="build">Build</button>
        <button data-tab="units">Units</button>
      </div>
      <div id="sidebar-buttons"></div>
      <div id="build-progress">
        <span id="build-progress-label"></span>
        <div id="build-progress-bar"><div id="build-progress-fill"></div></div>
      </div>
      <div id="minimap-container">
        <canvas id="minimap-canvas"></canvas>
      </div>
      <button id="surrender-btn">SURRENDER</button>
    </div>

    <!-- Selection panel -->
    <div id="selection-panel" class="panel interactive">
      <div id="selection-info"></div>
    </div>

    <!-- Main menu screen -->
    <div id="menu-main" class="menu-screen interactive">
      <div class="menu-title">ALPINE CHEESE RUSH</div>
      <div class="menu-subtitle">A Dune 2-style RTS</div>
      <button class="menu-btn" id="btn-skirmish">SKIRMISH</button>
      <button class="menu-btn secondary" id="btn-campaign">CAMPAIGN</button>
    </div>

    <!-- Skirmish setup screen -->
    <div id="menu-skirmish" class="menu-screen setup-screen interactive hidden">
      <div class="menu-title" style="font-size:28px;">SKIRMISH SETUP</div>
      <div class="section-label">Faction</div>
      <div class="option-row" id="skirmish-faction"></div>
      <div class="section-label">Map Size</div>
      <div class="option-row" id="skirmish-mapsize"></div>
      <div class="section-label">Opponents</div>
      <div class="option-row" id="skirmish-opponents"></div>
      <div class="section-label">Difficulty</div>
      <div class="option-row" id="skirmish-difficulty"></div>
      <button class="start-btn" id="btn-start-skirmish">START BATTLE</button>
      <button class="back-btn" id="btn-back-skirmish">BACK</button>
    </div>

    <!-- Campaign setup screen -->
    <div id="menu-campaign" class="menu-screen setup-screen interactive hidden">
      <div class="menu-title" style="font-size:28px;">CAMPAIGN</div>
      <div class="section-label">Faction</div>
      <div class="option-row" id="campaign-faction"></div>
      <div class="section-label" style="margin-bottom:12px;">Missions</div>
      <div id="campaign-missions"></div>
      <button class="start-btn" id="btn-start-campaign">START MISSION</button>
      <button class="back-btn" id="btn-back-campaign">BACK</button>
    </div>

    <!-- Result overlay -->
    <div id="menu-result" class="result-overlay interactive hidden">
      <div id="result-title" class="result-title"></div>
      <div id="result-time" class="result-time"></div>
      <button class="menu-btn" id="btn-return-menu">RETURN TO MENU</button>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
